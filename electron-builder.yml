appId: com.devispro.app
productName: DevisPro
copyright: Copyright © 2025 DevisPro

directories:
  buildResources: build
  output: release

files:
  - out/**/*
  - node_modules/**/*

asar: true
asarUnpack:
  - node_modules/sql.js/dist/sql-wasm.wasm

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: DevisPro-${version}-setup.${ext}
  sign: null
  signAndEditExecutable: false

nsis:
  oneClick: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: DevisPro
  runAfterFinish: true
  deleteAppDataOnUninstall: false

publish:
  provider: github
  owner: thibok92i
  repo: devis-factures-pro
  releaseType: release
